---
name: Binary Size
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
env:
  GOEXPERIMENT: jsonv2
  # Keep build flags in sync with the shipped full-featured build shape.
  BUILD_TAGS: containers_image_openpgp,containers_image_storage_stub,containers_image_docker_daemon_stub
  NOTES_REF: refs/notes/binary-size
jobs:
  shellcheck-wasm:
    name: Build shellcheck.wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/shellcheck-wasm
        with:
          artifact-name: shellcheck-wasm
  track-size:
    needs: shellcheck-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/download-shellcheck-wasm
        with:
          artifact-name: shellcheck-wasm
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build full-CGO binary
        run: |
          CGO_ENABLED=1 go build -tags "$BUILD_TAGS" -trimpath -ldflags="-s -w" -o tally-bin .
          SIZE=$(stat --format='%s' tally-bin)
          echo "SIZE=$SIZE" >> "$GITHUB_ENV"
          echo "Full-CGO Linux binary size: $SIZE bytes ($(numfmt --to=iec-i --suffix=B "$SIZE"))"
      - name: Fetch size notes
        run: git fetch origin "$NOTES_REF":"$NOTES_REF" 2>/dev/null || true
      - name: Record size (push to main)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git notes --ref="$NOTES_REF" add -f -m "$SIZE" "$GITHUB_SHA"
          git push origin "$NOTES_REF" 2>/dev/null || git push origin "$NOTES_REF" --force
      - name: Post size comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          # --- Collect history from git notes (chronological, oldest first) ---
          # Walk main branch commits and check which have size notes attached.
          declare -a SIZES=()
          declare -a LABELS=()

          while IFS= read -r sha; do
            blob=$(git notes --ref="$NOTES_REF" list "$sha" 2>/dev/null) || continue
            note=$(git cat-file -p "$blob")
            subject=$(git log --format='%s' -1 "$sha" 2>/dev/null | cut -c1-30)
            # Prepend (git log is newest-first, we reverse later).
            SIZES=("$note" "${SIZES[@]}")
            LABELS=("$subject" "${LABELS[@]}")
          done < <(git log --format='%H' origin/main -- 2>/dev/null | head -20)

          # --- Determine baseline (most recent recorded size on main) ---
          BASE_SIZE=""
          if [ ${#SIZES[@]} -gt 0 ]; then
            BASE_SIZE="${SIZES[-1]}"
          fi

          # --- Build comparison table ---
          PR_HUMAN=$(numfmt --to=iec-i --suffix=B "$SIZE")
          if [ -n "$BASE_SIZE" ] && [ "$BASE_SIZE" -gt 0 ] 2>/dev/null; then
            BASE_HUMAN=$(numfmt --to=iec-i --suffix=B "$BASE_SIZE")
            DIFF=$((SIZE - BASE_SIZE))
            if [ "$DIFF" -ge 0 ]; then DIFF_SIGN="+"; else DIFF_SIGN=""; fi
            DIFF_HUMAN=$(numfmt --to=iec-i --suffix=B -- "$DIFF")
            PCT=$(awk "BEGIN {printf \"%.2f\", ($DIFF / $BASE_SIZE) * 100}")
            read -r -d '' TABLE <<TABLEEOF || true
          | main | **${BASE_HUMAN}** |
          | This PR | **${PR_HUMAN}** |
          | Delta | ${DIFF_SIGN}${DIFF_HUMAN} (${DIFF_SIGN}${PCT}%) |
          TABLEEOF
          else
            read -r -d '' TABLE <<TABLEEOF || true
          | This PR | **${PR_HUMAN}** |
          | main | _no baseline yet_ |
          TABLEEOF
          fi

          # --- Build Mermaid xychart data ---
          X_LABELS=""
          Y_DATA=""
          SEP=""
          for i in "${!SIZES[@]}"; do
            safe="${LABELS[$i]//\"/\\\"}"
            X_LABELS="${X_LABELS}${SEP}\"${safe}\""
            Y_DATA="${Y_DATA}${SEP}${SIZES[$i]}"
            SEP=", "
          done
          X_LABELS="${X_LABELS}${SEP}\"This PR\""
          Y_DATA="${Y_DATA}${SEP}${SIZE}"

          # --- Assemble and post comment ---
          MARKER="<!-- binary-size-tracker -->"
          read -r -d '' BODY <<BODYEOF || true
          ${MARKER}
          ## Binary Size Report

          Measured artifact: full-CGO Linux binary built from this workflow.

          | | Size |
          |---|---|
          ${TABLE}
          <details>
          <summary>Size history</summary>

          \`\`\`mermaid
          xychart-beta
            title "Binary size (bytes)"
            x-axis [${X_LABELS}]
            y-axis "Bytes"
            bar [${Y_DATA}]
          \`\`\`

          </details>
          BODYEOF

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --paginate -q ".[] | select(.body | startswith(\"${MARKER}\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
