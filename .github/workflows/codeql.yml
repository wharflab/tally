---
name: 'CodeQL Security Scanning'
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 1 * * 0' # Weekly Sunday 1:30 UTC
permissions:
  contents: read
env:
  GOEXPERIMENT: jsonv2
defaults:
  run:
    shell: bash
jobs:
  analyze:
    runs-on: ubuntu-latest
    if: github.repository == 'wharflab/tally'
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/shellcheck-wasm
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ github.job }}-${{ runner.os }}
          external-cache: true
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml
          languages: go
          # Enable code quality checks in addition to security
          queries: security-and-quality
      - name: Build
        run: bazel build --config=release //:tally
      - name: CodeQL extraction build
        run: go test -a -run '^$' ./...
      - name: Perform Analysis
        uses: github/codeql-action/analyze@v4
