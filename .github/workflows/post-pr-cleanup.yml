---
name: post-pr-cleanup
on:
  pull_request:
    types: [closed]
permissions:
  packages: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete PR container images
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUM="${{ github.event.pull_request.number }}"
          PACKAGE="tally"
          OWNER="${{ github.repository_owner }}"

          for tag in "pr-${PR_NUM}" "pr-${PR_NUM}-linux-amd64" "pr-${PR_NUM}-linux-arm64" "pr-${PR_NUM}-windows-amd64"; do
            echo "Deleting tag: ${tag}"
            # Get the package version ID for this tag
            VERSION_ID="$(gh api \
              "orgs/${OWNER}/packages/container/${PACKAGE}/versions" \
              --paginate --jq ".[] | select(.metadata.container.tags | index(\"${tag}\")) | .id" 2>/dev/null || true)"
            if [ -n "${VERSION_ID}" ]; then
              gh api --method DELETE \
                "orgs/${OWNER}/packages/container/${PACKAGE}/versions/${VERSION_ID}" || true
              echo "  Deleted version ${VERSION_ID} (tag: ${tag})"
            else
              echo "  Not found, skipping"
            fi
          done
