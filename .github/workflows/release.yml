      VERSION: ${{ github.event_name == 'pull_request' && format('0.0.0-pr.{0}.{1}', github.event.pull_request.number, github.run_number) || inputs.version || github.ref_name }}
      PYPI_VERSION: ${{ github.event_name == 'pull_request' && format('0.0.0.dev{0}{1}', github.event.pull_request.number, github.run_number) || inputs.version || github.ref_name }}
      PYPI_PUBLISH_URL: ${{ github.event_name == 'pull_request' && 'https://test.pypi.org/legacy/' || '' }}
    steps:
      - uses: actions/checkout@v6
