  publish-homebrew:
    needs: publish-release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event_name == 'pull_request' && format('0.0.0-pr.{0}.{1}', github.event.pull_request.number, github.run_number) || inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: false
      - name: Download release dist
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist
      - name: Generate Homebrew formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${VERSION#v}"
          SHA256_DARWIN_ARM64="$(awk '/tally_'"${VERSION}"'_MacOS_arm64.tar.gz$/ { print $1 }' dist/tally_checksums.txt)"
          SHA256_DARWIN_AMD64="$(awk '/tally_'"${VERSION}"'_MacOS_x86_64.tar.gz$/ { print $1 }' dist/tally_checksums.txt)"
          SHA256_LINUX_ARM64="$(awk '/tally_'"${VERSION}"'_Linux_arm64.tar.gz$/ { print $1 }' dist/tally_checksums.txt)"
          SHA256_LINUX_AMD64="$(awk '/tally_'"${VERSION}"'_Linux_x86_64.tar.gz$/ { print $1 }' dist/tally_checksums.txt)"
          export SHA256_DARWIN_ARM64
          export SHA256_DARWIN_AMD64
          export SHA256_LINUX_ARM64
          export SHA256_LINUX_AMD64

          # Generate the formula from the checksums already produced by this release.
          chmod +x packaging/homebrew/generate-formula.sh
          packaging/homebrew/generate-formula.sh "$VERSION" tally.rb

          # Show generated formula
          cat tally.rb
      - name: Setup SSH for tap repository
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}" > ~/.ssh/homebrew_tap_key
          chmod 600 ~/.ssh/homebrew_tap_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << EOF
          Host github.com-tap
            HostName github.com
            User git
            IdentityFile ~/.ssh/homebrew_tap_key
            IdentitiesOnly yes
          EOF
      - name: Push to Homebrew tap
        if: github.event_name != 'pull_request'
        run: |
          VERSION="${VERSION#v}"

          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the tap repository using SSH
          git clone git@github.com-tap:wharflab/homebrew-tap.git tap

          # Ensure Formula directory exists and copy formula
          mkdir -p tap/Formula
          cp tally.rb tap/Formula/tally.rb
          cd tap
          git add Formula/tally.rb
          git commit -m "tally ${VERSION}" || echo "No changes to commit"
          git push
      - name: Upload Homebrew formula artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: homebrew-formula
          path: tally.rb
  publish-npm:
