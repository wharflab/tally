---
name: release
on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - ".github/macos-entitlements.plist"
      - "README.md"
      - "scripts/release/**"
      - "packaging/**"
      - "_integrations/**"
      - "Makefile"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.2.0)"
        required: true
        type: string
permissions:
  attestations: write
  contents: write
  id-token: write
  packages: write
env:
  GOEXPERIMENT: jsonv2
  GOTOOLCHAIN: auto
  DRY_RUN: ${{ github.event_name == 'pull_request' && '1' || '0' }}
  RELEASE_VERSION: ${{ github.event_name == 'pull_request' && format('0.0.0-pr.{0}.{1}', github.event.pull_request.number, github.run_number) || inputs.version || github.ref_name }}
  GEM_DRY_RUN_VERSION: ${{ github.event_name == 'pull_request' && format('0.0.0.pre.{0}.{1}', github.event.pull_request.number, github.run_number) || '' }}
  BUILD_TAGS: containers_image_openpgp,containers_image_storage_stub,containers_image_docker_daemon_stub
jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Reject fork pull requests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "::error::release workflow must not run from forks"
            exit 1
          fi
  build-platform:
    needs: preflight
    name: build-${{ matrix.id }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-amd64
            runs_on: ubuntu-24.04
            runner_os: Linux
            goos: linux
            goarch: amd64
            go_archive_arch: amd64
            variant: v1
            binary_name: tally
            archive_os: Linux
            archive_arch: x86_64
            cc: gcc
            cxx: g++
            container_image: public.ecr.aws/amazonlinux/amazonlinux:2
          - id: linux-arm64
            runs_on: ubuntu-24.04-arm
            runner_os: Linux
            goos: linux
            goarch: arm64
            go_archive_arch: arm64
            variant: v8.0
            binary_name: tally
            archive_os: Linux
            archive_arch: arm64
            cc: gcc
            cxx: g++
            container_image: public.ecr.aws/amazonlinux/amazonlinux:2
          - id: darwin-amd64
            runs_on: macos-15-intel
            runner_os: macOS
            goos: darwin
            goarch: amd64
            variant: v1
            binary_name: tally
            archive_os: MacOS
            archive_arch: x86_64
            cc: clang
            cxx: clang++
          - id: darwin-arm64
            runs_on: macos-15
            runner_os: macOS
            goos: darwin
            goarch: arm64
            variant: v8.0
            binary_name: tally
            archive_os: MacOS
            archive_arch: arm64
            cc: clang
            cxx: clang++
          - id: windows-amd64
            runs_on: windows-2025
            runner_os: Windows
            goos: windows
            goarch: amd64
            variant: v1
            binary_name: tally.exe
            archive_os: Windows
            archive_arch: x86_64
            cc: clang
            cxx: clang++
            msystem: CLANG64
          - id: windows-arm64
            runs_on: windows-11-arm
            runner_os: Windows
            goos: windows
            goarch: arm64
            variant: v8.0
            binary_name: tally.exe
            archive_os: Windows
            archive_arch: arm64
            cc: clang
            cxx: clang++
            msystem: CLANGARM64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true
      - name: Set up Go
        uses: actions/setup-go@v6
        if: matrix.runner_os != 'Linux'
        with:
          go-version-file: go.mod
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"
      - name: Set up MSYS2
        if: matrix.runner_os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          location: ${{ runner.temp }}
          path-type: inherit
          pacboy: toolchain:p
      - name: Build binary
        if: matrix.runner_os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          CLEAN_VERSION="${RELEASE_VERSION#v}"
          GO_VERSION="$(sed -n 's/^go //p' go.mod | head -n 1)"
          if [ -z "${GO_VERSION}" ]; then
            echo "::error::Failed to resolve Go version from go.mod"
            exit 1
          fi
          GO_ARCHIVE_URL="https://go.dev/dl/go${GO_VERSION}.linux-${{ matrix.go_archive_arch }}.tar.gz"
          DIST_DIR="dist/tally_${{ matrix.goos }}_${{ matrix.goarch }}_${{ matrix.variant }}"
          mkdir -p "${DIST_DIR}"
          LDFLAGS="-s -w -X github.com/wharflab/tally/internal/version.version=${CLEAN_VERSION} -X github.com/wharflab/tally/internal/version.commit=${GITHUB_SHA}"
          echo "Using Go toolchain archive: ${GO_ARCHIVE_URL}"
          docker run --rm \
            --platform "linux/${{ matrix.goarch }}" \
            -e GOEXPERIMENT="${GOEXPERIMENT}" \
            -e GOTOOLCHAIN="${GOTOOLCHAIN}" \
            -e GOSUMDB="sum.golang.org" \
            -e GO_ARCHIVE_URL="${GO_ARCHIVE_URL}" \
            -e GOOS="${{ matrix.goos }}" \
            -e GOARCH="${{ matrix.goarch }}" \
            -e BUILD_TAGS="${BUILD_TAGS}" \
            -e LDFLAGS="${LDFLAGS}" \
            -e DIST_DIR="${DIST_DIR}" \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            "${{ matrix.container_image }}" \
            bash -lc '
              set -euo pipefail
              yum install -y gcc gcc-c++ git curl tar gzip python3 make ca-certificates binutils
              curl -fsSL "${GO_ARCHIVE_URL}" | tar -C /usr/local -xz
              export PATH=/usr/local/go/bin:$PATH
              CC=gcc \
              CXX=g++ \
              CGO_ENABLED=1 \
              GOOS="${GOOS}" \
              GOARCH="${GOARCH}" \
              go build -buildvcs=false -tags "${BUILD_TAGS}" -trimpath -ldflags "${LDFLAGS}" -o "${DIST_DIR}/${{ matrix.binary_name }}" .
              chmod 755 "${DIST_DIR}/${{ matrix.binary_name }}"
            '
      - name: Smoke test Linux binary on host
        if: matrix.runner_os == 'Linux'
        shell: bash
        env:
          EXPECTED_VERSION: ${{ env.RELEASE_VERSION }}
          EXPECTED_GOOS: ${{ matrix.goos }}
          EXPECTED_GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          BINARY="dist/tally_${{ matrix.goos }}_${{ matrix.goarch }}_${{ matrix.variant }}/${{ matrix.binary_name }}"
          VERSION_JSON_FILE="$(mktemp)"
          "${BINARY}" version --json > "${VERSION_JSON_FILE}"
          cat "${VERSION_JSON_FILE}"
          python - "${VERSION_JSON_FILE}" <<'PY'
          import json
          import os
          import sys

          version_json_path = sys.argv[1]
          expected_version = os.environ["EXPECTED_VERSION"].removeprefix("v")

          with open(version_json_path, encoding="utf-8") as fh:
              payload = json.load(fh)

          assert payload["version"] == expected_version, payload
          assert payload["platform"]["os"] == os.environ["EXPECTED_GOOS"], payload
          assert payload["platform"]["arch"] == os.environ["EXPECTED_GOARCH"], payload
          PY
      - name: Build binary
        if: matrix.runner_os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          CLEAN_VERSION="${RELEASE_VERSION#v}"
          DIST_DIR="dist/tally_${{ matrix.goos }}_${{ matrix.goarch }}_${{ matrix.variant }}"
          mkdir -p "${DIST_DIR}"
          LDFLAGS="-s -w -X github.com/wharflab/tally/internal/version.version=${CLEAN_VERSION} -X github.com/wharflab/tally/internal/version.commit=${GITHUB_SHA}"
          CC="${{ matrix.cc }}" \
          CXX="${{ matrix.cxx }}" \
          CGO_ENABLED=1 \
          GOOS="${{ matrix.goos }}" \
          GOARCH="${{ matrix.goarch }}" \
          go build -tags "${BUILD_TAGS}" -trimpath -ldflags "${LDFLAGS}" -o "${DIST_DIR}/${{ matrix.binary_name }}" .
      - name: Build binary
        if: matrix.runner_os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          CLEAN_VERSION="${RELEASE_VERSION#v}"
          DIST_DIR="dist/tally_${{ matrix.goos }}_${{ matrix.goarch }}_${{ matrix.variant }}"
          mkdir -p "${DIST_DIR}"
          export CC="${{ matrix.cc }}"
          export CXX="${{ matrix.cxx }}"
          export CGO_ENABLED=1
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"
          LDFLAGS="-s -w -X github.com/wharflab/tally/internal/version.version=${CLEAN_VERSION} -X github.com/wharflab/tally/internal/version.commit=${GITHUB_SHA}"
          go build -tags "${BUILD_TAGS}" -trimpath -ldflags "${LDFLAGS}" -o "${DIST_DIR}/${{ matrix.binary_name }}" .
      - name: Import Code Signing Certificate
        if: matrix.goos == 'darwin'
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      - name: Sign and notarize macOS binary
        if: matrix.goos == 'darwin'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          ENTITLEMENTS_FILE=".github/macos-entitlements.plist"
          BINARY="dist/tally_${{ matrix.goos }}_${{ matrix.goarch }}_${{ matrix.variant }}/${{ matrix.binary_name }}"
          if [ ! -f "$ENTITLEMENTS_FILE" ]; then
            echo "Missing entitlements file: $ENTITLEMENTS_FILE"
            exit 1
          fi
          codesign --force --options runtime --entitlements "$ENTITLEMENTS_FILE" --sign "$APPLE_TEAM_ID" "$BINARY"
          codesign --verify --verbose "$BINARY"
          zip "${BINARY}.zip" "$BINARY"
          xcrun notarytool submit "${BINARY}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm "${BINARY}.zip"
      - name: Package release artifact
        if: matrix.runner_os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release/package_release_artifact.py \
            --version "${RELEASE_VERSION#v}" \
            --goos "${{ matrix.goos }}" \
            --goarch "${{ matrix.goarch }}" \
            --variant "${{ matrix.variant }}" \
            --binary-name "${{ matrix.binary_name }}" \
            --archive-os "${{ matrix.archive_os }}" \
            --archive-arch "${{ matrix.archive_arch }}"
      - name: Package release artifact
        if: matrix.runner_os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          python scripts/release/package_release_artifact.py \
            --version "${RELEASE_VERSION#v}" \
            --goos "${{ matrix.goos }}" \
            --goarch "${{ matrix.goarch }}" \
            --variant "${{ matrix.variant }}" \
            --binary-name "${{ matrix.binary_name }}" \
            --archive-os "${{ matrix.archive_os }}" \
            --archive-arch "${{ matrix.archive_arch }}"
      - name: Upload platform artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-platform-${{ matrix.id }}
          path: dist/
      - name: Log in to GHCR
        if: matrix.runner_os != 'macOS' && matrix.id != 'windows-arm64' && env.DRY_RUN != '1'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        if: matrix.runner_os == 'Linux'
        uses: docker/setup-buildx-action@v3
      - name: Compute Linux container image metadata
        if: matrix.runner_os == 'Linux'
        id: linux_image_meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          VERSION_TAG="v${RELEASE_VERSION#v}"
          COMPONENT_TAG="${VERSION_TAG}-linux-${{ matrix.goarch }}-build"
          CONTEXT_DIR="dist/tally_${{ matrix.goos }}_${{ matrix.goarch }}_${{ matrix.variant }}"
          {
            echo "image_repo=${IMAGE_REPO}"
            echo "version_tag=${VERSION_TAG}"
            echo "component_tag=${COMPONENT_TAG}"
            echo "context_dir=${CONTEXT_DIR}"
          } >> "$GITHUB_OUTPUT"
      - name: Build container image
        if: matrix.runner_os == 'Linux'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.linux_image_meta.outputs.context_dir }}
          file: packaging/docker/linux.Dockerfile
          platforms: linux/${{ matrix.goarch }}
          build-args: |
            VERSION=${{ steps.linux_image_meta.outputs.version_tag }}
            VCS_REF=${{ github.sha }}
            SOURCE_URL=https://github.com/${{ github.repository }}
          tags: ${{ steps.linux_image_meta.outputs.image_repo }}:${{ steps.linux_image_meta.outputs.component_tag }}
          load: ${{ env.DRY_RUN == '1' }}
          push: ${{ env.DRY_RUN != '1' }}
          provenance: ${{ env.DRY_RUN != '1' && 'mode=max' || 'false' }}
          sbom: ${{ env.DRY_RUN != '1' }}
      - name: Summarize Linux container image
        if: matrix.runner_os == 'Linux'
        shell: bash
        run: |
          {
            echo "Container image:"
            echo "- ${{ steps.linux_image_meta.outputs.image_repo }}:${{ steps.linux_image_meta.outputs.component_tag }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Build and push Windows container image
        if: matrix.id == 'windows-amd64'
        shell: pwsh
        run: |
          $imageRepo = "ghcr.io/$env:GITHUB_REPOSITORY".ToLowerInvariant()
          $versionTag = "v$($env:RELEASE_VERSION.TrimStart('v'))"
          $componentTag = "$versionTag-windows-ltsc2025-amd64-build"
          $imageRef = "$($imageRepo):$componentTag"
          $contextDir = "dist/tally_${{ matrix.goos }}_${{ matrix.goarch }}_${{ matrix.variant }}"
          docker build `
            --build-arg VERSION="$versionTag" `
            --build-arg VCS_REF="$env:GITHUB_SHA" `
            --build-arg SOURCE_URL="https://github.com/$env:GITHUB_REPOSITORY" `
            --file packaging/docker/windows.Dockerfile `
            --tag "$imageRef" `
            $contextDir
          if ($env:DRY_RUN -ne "1") {
            docker push "$imageRef"
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Container image:`n- $imageRef"
      - name: Explain Windows arm64 container skip
        if: matrix.id == 'windows-arm64'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Windows arm64 container publish is skipped: Microsoft Nano Server LTSC base images currently publish windows/amd64 only."
  publish-release:
    needs: build-platform
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event_name == 'pull_request' && format('0.0.0-pr.{0}.{1}', github.event.pull_request.number, github.run_number) || inputs.version || github.ref_name }}
      PR_HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || '' }}
    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-platform-*
          merge-multiple: true
          path: dist
      - name: Generate release checksums
        run: |
          set -euo pipefail
          cd dist
          find . -maxdepth 1 -type f \( -name 'tally_*.tar.gz' -o -name 'tally_*.zip' -o -name 'tally_*.exe' \) -printf '%f\n' \
            | sort \
            | xargs sha256sum > tally_checksums.txt
          cat tally_checksums.txt
      - name: Attest release artifacts
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/tally_*.tar.gz
            dist/tally_*.zip
            dist/tally_*.exe
            dist/tally_checksums.txt
      - name: Create or update GitHub release
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          TAG="v${VERSION#v}"
          DOCS="https://docs.github.com/en/actions/security-for-github-actions"
          DOCS="${DOCS}/using-artifact-attestations"
          DOCS="${DOCS}/using-artifact-attestations-to-establish-provenance-for-builds"
          read -r -d '' ATTESTATION_BODY << ATTESTATION_EOF || true

          ## Verifying GitHub Artifact Attestations

          The artifacts in this release have attestations generated with
          [GitHub Artifact Attestations](${DOCS}).
          These can be verified using the [GitHub CLI](https://cli.github.com/):

          \`\`\`shell
          gh attestation verify <artifact> --repo ${REPO}
          \`\`\`

          You can also download the attestation from GitHub and
          verify against that directly:

          \`\`\`shell
          gh attestation verify <artifact> --bundle <attestation>
          \`\`\`
          ATTESTATION_EOF
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            NOTES="$(gh api "repos/${REPO}/releases/generate-notes" \
              -f tag_name="$TAG" -f target_commitish="$GITHUB_SHA" \
              --jq '.body')"
            FULL_BODY="${NOTES}${ATTESTATION_BODY}"
            gh release create "$TAG" --repo "$REPO" --title "$TAG" --notes "$FULL_BODY" --target "$GITHUB_SHA"
          else
            EXISTING_BODY="$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body')"
            if ! echo "$EXISTING_BODY" | grep -q 'Verifying GitHub Artifact Attestations'; then
              FULL_BODY="${EXISTING_BODY}${ATTESTATION_BODY}"
              gh release edit "$TAG" --repo "$REPO" --notes "$FULL_BODY"
            fi
          fi
          mapfile -t assets < <(find dist -maxdepth 1 -type f \( -name 'tally_*.tar.gz' -o -name 'tally_*.zip' -o -name 'tally_*.exe' -o -name 'tally_checksums.txt' \) | sort)
          gh release upload "$TAG" --repo "$REPO" "${assets[@]}" --clobber
      - name: Summarize dry-run release assets
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          echo "PR dry run would publish:" >> "$GITHUB_STEP_SUMMARY"
          find dist -maxdepth 1 -type f \( -name 'tally_*.tar.gz' -o -name 'tally_*.zip' -o -name 'tally_*.exe' -o -name 'tally_checksums.txt' \) -printf '- %f\n' \
            | sort >> "$GITHUB_STEP_SUMMARY"
      - name: Upload aggregated release dist
        uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: dist/
  publish-container-images:
    needs: publish-release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event_name == 'pull_request' && format('0.0.0-pr.{0}.{1}', github.event.pull_request.number, github.run_number) || inputs.version || github.ref_name }}
    steps:
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Assemble container tags
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMAGE_REPO="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          VERSION_TAG="v${VERSION#v}"
          LINUX_AMD64="${IMAGE_REPO}:${VERSION_TAG}-linux-amd64-build"
          LINUX_ARM64="${IMAGE_REPO}:${VERSION_TAG}-linux-arm64-build"
          WINDOWS_AMD64="${IMAGE_REPO}:${VERSION_TAG}-windows-ltsc2025-amd64-build"

          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION_TAG}" \
            -t "${IMAGE_REPO}:latest" \
            "${LINUX_AMD64}" \
            "${LINUX_ARM64}" \
            "${WINDOWS_AMD64}"

          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION_TAG}-linux" \
            -t "${IMAGE_REPO}:linux" \
            -t "${IMAGE_REPO}:${VERSION_TAG}-distroless" \
            -t "${IMAGE_REPO}:distroless" \
            "${LINUX_AMD64}" \
            "${LINUX_ARM64}"

          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION_TAG}-linux-amd64" \
            -t "${IMAGE_REPO}:linux-amd64" \
            "${LINUX_AMD64}"

          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION_TAG}-linux-arm64" \
            -t "${IMAGE_REPO}:linux-arm64" \
            "${LINUX_ARM64}"

          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION_TAG}-nanoserver-ltsc2025" \
            -t "${IMAGE_REPO}:nanoserver-ltsc2025" \
            -t "${IMAGE_REPO}:${VERSION_TAG}-windows-ltsc2025-amd64" \
            -t "${IMAGE_REPO}:windows-ltsc2025-amd64" \
            "${WINDOWS_AMD64}"

          {
            echo "Published container tags:"
            echo "- ${IMAGE_REPO}:${VERSION_TAG}"
            echo "- ${IMAGE_REPO}:latest"
            echo "- ${IMAGE_REPO}:distroless"
            echo "- ${IMAGE_REPO}:linux"
            echo "- ${IMAGE_REPO}:linux-amd64"
            echo "- ${IMAGE_REPO}:linux-arm64"
            echo "- ${IMAGE_REPO}:nanoserver-ltsc2025"
            echo "- ${IMAGE_REPO}:windows-ltsc2025-amd64"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Summarize dry-run container tags
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          IMAGE_REPO="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          VERSION_TAG="v${VERSION#v}"
          {
            echo "PR dry run would publish container tags:"
            echo "- ${IMAGE_REPO}:${VERSION_TAG}"
            echo "- ${IMAGE_REPO}:latest"
            echo "- ${IMAGE_REPO}:distroless"
            echo "- ${IMAGE_REPO}:linux"
            echo "- ${IMAGE_REPO}:linux-amd64"
            echo "- ${IMAGE_REPO}:linux-arm64"
            echo "- ${IMAGE_REPO}:nanoserver-ltsc2025"
            echo "- ${IMAGE_REPO}:windows-ltsc2025-amd64"
            echo
            echo "Windows arm64 stays binary-only because Nano Server LTSC base images currently publish windows/amd64 only."
          } >> "$GITHUB_STEP_SUMMARY"
  build-vscode-vsix:
    needs: publish-release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event_name == 'pull_request' && format('0.0.0-pr.{0}.{1}', github.event.pull_request.number, github.run_number) || inputs.version || github.ref_name }}
    strategy:
      matrix:
        include:
          - vscode_target: linux-x64
            dist_dir: tally_linux_amd64_v1
            bundled_platform: linux
            bundled_arch: x64
            binary_name: tally
          - vscode_target: linux-arm64
            dist_dir: tally_linux_arm64_v8.0
            bundled_platform: linux
            bundled_arch: arm64
            binary_name: tally
          - vscode_target: darwin-x64
            dist_dir: tally_darwin_amd64_v1
            bundled_platform: darwin
            bundled_arch: x64
            binary_name: tally
          - vscode_target: darwin-arm64
            dist_dir: tally_darwin_arm64_v8.0
            bundled_platform: darwin
            bundled_arch: arm64
            binary_name: tally
          - vscode_target: win32-x64
            dist_dir: tally_windows_amd64_v1
            bundled_platform: windows
            bundled_arch: x64
            binary_name: tally.exe
          - vscode_target: win32-arm64
            dist_dir: tally_windows_arm64_v8.0
            bundled_platform: windows
            bundled_arch: arm64
            binary_name: tally.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: false
      - name: Download signed artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist
      - name: Copy binary into extension bundle
        run: |
          SRC_DIR="dist/${{ matrix.dist_dir }}"
          SRC="${SRC_DIR}/${{ matrix.binary_name }}"
          if [ ! -d "$SRC_DIR" ]; then
            echo "::error::Expected release dist directory '$SRC_DIR' not found."
            ls -la dist/
            exit 1
          fi
          if [ ! -f "$SRC" ]; then
            echo "::error::Binary '$SRC' not found in release dist."
            ls -la "$SRC_DIR/"
            exit 1
          fi
          DEST="_integrations/vscode-tally/bundled/bin/${{ matrix.bundled_platform }}/${{ matrix.bundled_arch }}"
          mkdir -p "$DEST"
          cp "$SRC" "$DEST/${{ matrix.binary_name }}"
          chmod +x "$DEST/${{ matrix.binary_name }}"
      - name: Set extension version from tag
        working-directory: _integrations/vscode-tally
        run: |
          CLEAN_VERSION="${VERSION#v}"
          npm version --no-git-tag-version --ignore-scripts "$CLEAN_VERSION"
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: _integrations/vscode-tally
      - name: Compile extension
        run: bun run prevsce:package
        working-directory: _integrations/vscode-tally
      - name: Package platform-specific VSIX
        run: bunx @vscode/vsce package --no-dependencies --target ${{ matrix.vscode_target }} -o tally-${{ matrix.vscode_target }}.vsix
        working-directory: _integrations/vscode-tally
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.vscode_target }}
          path: _integrations/vscode-tally/tally-${{ matrix.vscode_target }}.vsix
      - name: Attest VSIX artifact
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: _integrations/vscode-tally/tally-${{ matrix.vscode_target }}.vsix
      - name: Upload VSIX to GitHub release
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # VERSION is tag name for push (v0.4.0) or bare version for workflow_dispatch (0.4.0)
          TAG="v${VERSION#v}"
          gh release upload "$TAG" \
            "_integrations/vscode-tally/tally-${{ matrix.vscode_target }}.vsix" \
            --clobber
  build-intellij-plugin:
    needs: publish-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERSION: ${{ github.event_name == 'pull_request' && format('0.0.0-pr.{0}.{1}', github.event.pull_request.number, github.run_number) || inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: false
      - name: Download signed artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist
      - name: Copy binaries into IntelliJ plugin bundle
        run: |
          copy_binary() {
            local src_dir_pattern="$1"
            local platform="$2"
            local arch="$3"
            local binary_name="$4"
            local src_dir
            src_dir="$(find dist -maxdepth 1 -type d -name "${src_dir_pattern}" | head -n 1)"
            if [ -z "${src_dir}" ]; then
              echo "::error::Expected release dist directory matching '${src_dir_pattern}' not found."
              ls -la dist/
              exit 1
            fi

            local src="${src_dir}/${binary_name}"
            if [ ! -f "${src}" ]; then
              echo "::error::Binary '${src}' not found in release dist."
              ls -la "${src_dir}/"
              exit 1
            fi

            local dest="_integrations/intellij-tally/bundled/bin/${platform}/${arch}"
            mkdir -p "${dest}"
            cp "${src}" "${dest}/${binary_name}"
            chmod +x "${dest}/${binary_name}" || true
          }

          rm -rf _integrations/intellij-tally/bundled/bin
          copy_binary "tally_linux_amd64*" "linux" "x64" "tally"
          copy_binary "tally_linux_arm64*" "linux" "arm64" "tally"
          copy_binary "tally_darwin_amd64*" "darwin" "x64" "tally"
          copy_binary "tally_darwin_arm64*" "darwin" "arm64" "tally"
          copy_binary "tally_windows_amd64*" "windows" "x64" "tally.exe"
          copy_binary "tally_windows_arm64*" "windows" "arm64" "tally.exe"
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Set IntelliJ plugin version from tag
        run: |
          CLEAN_VERSION="${VERSION#v}"
          VERSIONS_TOML="_integrations/intellij-tally/build/versions.toml"
          sed -i -E "s/^plugin_version = \".*\"/plugin_version = \"${CLEAN_VERSION}\"/" \
            "${VERSIONS_TOML}"
          if command -v taplo >/dev/null 2>&1; then
            ACTUAL_VERSION="$(taplo get -f "${VERSIONS_TOML}" --strip-newline plugin_version || true)"
            if [ "${ACTUAL_VERSION}" != "${CLEAN_VERSION}" ]; then
              echo "::error::Failed to set plugin_version in versions.toml (expected=${CLEAN_VERSION}, actual=${ACTUAL_VERSION})"
              exit 1
            fi
          else
            grep -qE "^plugin_version = \"${CLEAN_VERSION}\"$" "${VERSIONS_TOML}" \
              || { echo "::error::Failed to set plugin_version in versions.toml"; exit 1; }
          fi
      - name: Build IntelliJ plugin
        run: make intellij-plugin
      - name: IntelliJ Community smoke check
        run: make intellij-plugin-smoke
      - name: Resolve IntelliJ plugin artifact
        id: intellij_zip
        run: |
          CLEAN_VERSION="${VERSION#v}"
          ZIP_PATH="_integrations/intellij-tally/dist/tally-intellij-plugin-${CLEAN_VERSION}.zip"
          if [ ! -f "$ZIP_PATH" ]; then
            echo "::error::Expected IntelliJ plugin zip not found at $ZIP_PATH"
            ls -la _integrations/intellij-tally/dist || true
            exit 1
          fi
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
      - name: Upload IntelliJ plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: intellij-plugin-zip
          path: ${{ steps.intellij_zip.outputs.zip_path }}
      - name: Attest IntelliJ plugin artifact
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.intellij_zip.outputs.zip_path }}
      - name: Upload IntelliJ plugin to GitHub release
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${VERSION#v}"
          gh release upload "$TAG" "${{ steps.intellij_zip.outputs.zip_path }}" --clobber
  publish-intellij-marketplace:
    needs: build-intellij-plugin
    runs-on: ubuntu-latest
    env:
      JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
      JETBRAINS_MARKETPLACE_CHANNEL: ${{ vars.JETBRAINS_MARKETPLACE_CHANNEL }}
      JETBRAINS_MARKETPLACE_PR_CHANNEL: ${{ vars.JETBRAINS_MARKETPLACE_PR_CHANNEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: false
      - name: Download IntelliJ plugin artifact
        uses: actions/download-artifact@v8
        with:
          name: intellij-plugin-zip
          path: intellij-plugin
      - name: Publish to JetBrains Marketplace
        run: |
          set -euo pipefail

          if [ -z "${JETBRAINS_MARKETPLACE_TOKEN}" ]; then
            echo "JETBRAINS_MARKETPLACE_TOKEN is not set; skipping JetBrains Marketplace publish."
            exit 0
          fi

          MARKETPLACE_CHANNEL="${JETBRAINS_MARKETPLACE_CHANNEL}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            MARKETPLACE_CHANNEL="${JETBRAINS_MARKETPLACE_PR_CHANNEL:-pr}"
            echo "Publishing dry-run IntelliJ plugin to JetBrains custom channel '${MARKETPLACE_CHANNEL}'."
          fi

          ZIP_PATH="$(find intellij-plugin -maxdepth 1 -type f -name '*.zip' | head -n 1)"
          if [ -z "${ZIP_PATH}" ]; then
            echo "::error::No IntelliJ plugin zip found in artifact directory."
            ls -la intellij-plugin || true
            exit 1
          fi

          XML_ID="$(grep -E '^plugin_id[[:space:]]*=' _integrations/intellij-tally/build/versions.toml | head -n 1 | sed -E 's/^[^=]*=[[:space:]]*\"([^\"]+)\".*/\1/')"
          if [ -z "${XML_ID}" ]; then
            echo "::error::Unable to resolve plugin_id from versions.toml."
            exit 1
          fi

          CURL_ARGS=(
            -F "xmlId=${XML_ID}"
            -F "file=@${ZIP_PATH}"
          )
          if [ -n "${MARKETPLACE_CHANNEL}" ]; then
            CURL_ARGS+=(-F "channel=${MARKETPLACE_CHANNEL}")
          fi

          RESPONSE_FILE="$(mktemp)"
          trap 'rm -f "${RESPONSE_FILE}"' EXIT

          set +e
          HTTP_CODE="$(
            curl \
              --silent \
              --show-error \
              --location \
              --retry 5 \
              --retry-delay 2 \
              --connect-timeout 30 \
              --max-time 600 \
              --output "${RESPONSE_FILE}" \
              --write-out '%{http_code}' \
              --header "Authorization: Bearer ${JETBRAINS_MARKETPLACE_TOKEN}" \
              "${CURL_ARGS[@]}" \
              https://plugins.jetbrains.com/api/updates/upload
          )"
          CURL_STATUS=$?
          set -e

          if [ "${CURL_STATUS}" -ne 0 ]; then
            echo "::error::JetBrains Marketplace upload request failed before completion (curl exit ${CURL_STATUS})."
            if [ -s "${RESPONSE_FILE}" ]; then
              echo "Marketplace response:"
              cat "${RESPONSE_FILE}"
            fi
            exit "${CURL_STATUS}"
          fi

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::error::JetBrains Marketplace upload failed with HTTP ${HTTP_CODE}."
            if [ -s "${RESPONSE_FILE}" ]; then
              echo "Marketplace response:"
              cat "${RESPONSE_FILE}"
            fi
            if grep -qiE 'plugin developer agreement|accept(ed)? .*agreement|updated agreement|license agreement' "${RESPONSE_FILE}"; then
              echo "::error::JetBrains Marketplace is blocking uploads until the vendor accepts the updated Developer Agreement. Log into plugins.jetbrains.com with the plugin owner account, accept the agreement, then rerun the release."
            fi
            exit 1
          fi

          echo "JetBrains Marketplace upload accepted."
          if [ -s "${RESPONSE_FILE}" ]; then
            cat "${RESPONSE_FILE}"
          fi
  publish-vscode-marketplace:
    if: github.event_name != 'pull_request'
    needs: build-vscode-vsix
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - name: Setup Bun
        if: env.VSCE_PAT != ''
