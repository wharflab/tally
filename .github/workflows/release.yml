  publish-winget:
    needs:
      - preflight
      - publish-release
    runs-on: windows-2025
    env:
      VERSION: ${{ github.event_name == 'pull_request' && format('0.0.0-pr.{0}.{1}', github.event.pull_request.number, github.run_number) || inputs.version || github.ref_name }}
    steps:
      - name: Verify WinGet publishing auth is configured
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ vars.HARBOR_PILOT_APP_ID }}")) {
            Write-Error "::error::HARBOR_PILOT_APP_ID must be configured to publish WinGet PRs"
          }
      - name: Checkout tally
        uses: actions/checkout@v6
        if: github.event_name == 'pull_request' || vars.HARBOR_PILOT_APP_ID != ''
        with:
          lfs: false
          path: tally
      - name: Generate GitHub App token
        id: app-token-winget
        if: github.event_name != 'pull_request' && vars.HARBOR_PILOT_APP_ID != ''
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.HARBOR_PILOT_APP_ID }}
          private-key: ${{ secrets.HARBOR_PILOT_PRIVATE_KEY }}
          owner: wharflab
          repositories: winget-pkgs
      - name: Checkout winget-pkgs fork
        uses: actions/checkout@v6
        if: github.event_name != 'pull_request' && vars.HARBOR_PILOT_APP_ID != ''
        with:
          lfs: false
          repository: wharflab/winget-pkgs
          token: ${{ steps.app-token-winget.outputs.token }}
          path: winget-pkgs
      - name: Checkout upstream winget-pkgs (dry run)
        uses: actions/checkout@v6
        if: github.event_name == 'pull_request'
        with:
          lfs: false
          repository: microsoft/winget-pkgs
          path: winget-pkgs
      - name: Download release dist
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist
      - name: Generate WinGet manifests
        if: github.event_name == 'pull_request' || vars.HARBOR_PILOT_APP_ID != ''
        env:
          GH_TOKEN: ${{ steps.app-token-winget.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROSS_FORK_PR_PAT: ${{ secrets.CROSS_FORK_PR_PAT }}
          PR_BODY: |
            Publishing version ${{ inputs.version || github.ref_name }} of [tally](https://github.com/wharflab/tally) to WinGet.

            Tally is a Dockerfile linter and formatter written in Go, promoting modern container syntax and helping avoid common pitfalls.

            [Changelog](https://github.com/wharflab/tally/releases/tag/${{ inputs.version || github.ref_name }})
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $CleanVersion = $env:VERSION.TrimStart("v")
          $Branch = "tally-update"
          if ($env:GITHUB_EVENT_NAME -eq "pull_request") {
            $ReleaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd")
          } else {
            $ReleaseDate = gh release view "v$CleanVersion" --repo "$env:GITHUB_REPOSITORY" --json publishedAt --jq '.publishedAt[0:10]'
          }

          git config --global user.name "tinovyatkin"
          git config --global user.email "tino@vtkn.io"

          Push-Location winget-pkgs
          if (-not (git remote | Select-String '^upstream$')) {
            git remote add upstream https://github.com/microsoft/winget-pkgs.git
          }
          git fetch upstream master
          git checkout -B $Branch upstream/master
          Pop-Location

          ruby tally/scripts/release/generate_winget_manifests.rb `
            --version $CleanVersion `
            --dist-root dist `
            --release-date $ReleaseDate `
            --output-root winget-pkgs/manifests

          $ManifestPath = Join-Path "winget-pkgs" "manifests/w/Wharflab/Tally/$CleanVersion"
          winget settings --enable LocalManifestFiles
          winget validate --manifest $ManifestPath

          Push-Location winget-pkgs
          git add "manifests/w/Wharflab/Tally/$CleanVersion"
          $StagedChanges = git diff --cached --name-only | Out-String
          if ([string]::IsNullOrWhiteSpace($StagedChanges)) {
            Write-Host "No WinGet changes detected; skipping PR sync."
            exit 0
          }
          if ($env:DRY_RUN -eq "1") {
            git diff --cached | Out-File -FilePath ..\winget-dry-run.patch -Encoding utf8NoBOM
            Write-Host "Generated WinGet dry-run patch:"
            git diff --cached --stat
            exit 0
          }

          git commit -m "Wharflab.Tally version $CleanVersion"
          git push origin $Branch --force

          if ([string]::IsNullOrWhiteSpace($env:CROSS_FORK_PR_PAT)) {
            Write-Error "::error::CROSS_FORK_PR_PAT secret is required to create cross-fork PRs to microsoft/winget-pkgs"
          }
          $env:GH_TOKEN = $env:CROSS_FORK_PR_PAT
          $PrTitle = "Wharflab.Tally version $CleanVersion"
          $OldPSNativeCommandUseErrorActionPreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          try {
            $PrOutput = gh pr create `
              --repo microsoft/winget-pkgs `
              --head "wharflab:$Branch" `
              --base master `
              --title $PrTitle `
              --body $env:PR_BODY 2>&1 | Out-String
          } finally {
            $PSNativeCommandUseErrorActionPreference = $OldPSNativeCommandUseErrorActionPreference
          }
          if ($LASTEXITCODE -ne 0) {
            $Match = [regex]::Match($PrOutput, 'pull/(\d+)')
            if ($Match.Success) {
              $ExistingPr = $Match.Groups[1].Value
              gh pr edit $ExistingPr `
                --repo microsoft/winget-pkgs `
                --title $PrTitle `
                --body $env:PR_BODY
              Write-Host "Updated existing PR: https://github.com/microsoft/winget-pkgs/pull/$ExistingPr"
            } else {
              Write-Error "::error::Failed to create or update PR: $PrOutput"
            }
          } else {
            Write-Host "PR: $PrOutput"
          }
          Pop-Location
      - name: Upload WinGet dry-run patch
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: winget-dry-run-patch
          path: winget-dry-run.patch
  publish-zed-marketplace:
    needs:
      - preflight
      - publish-release
      - publish-npm
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event_name == 'pull_request' && format('0.0.0-pr.{0}.{1}', github.event.pull_request.number, github.run_number) || inputs.version || github.ref_name }}
    steps:
      - name: Checkout tally
        uses: actions/checkout@v6
        if: github.event_name == 'pull_request' || vars.HARBOR_PILOT_APP_ID != ''
        with:
          lfs: false
          path: tally
      - name: Generate GitHub App token
        id: app-token
        if: github.event_name != 'pull_request' && vars.HARBOR_PILOT_APP_ID != ''
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.HARBOR_PILOT_APP_ID }}
          private-key: ${{ secrets.HARBOR_PILOT_PRIVATE_KEY }}
          owner: wharflab
          repositories: zed-extensions
      - name: Checkout zed-extensions fork
        uses: actions/checkout@v6
        if: github.event_name != 'pull_request' && vars.HARBOR_PILOT_APP_ID != ''
        with:
          lfs: false
          repository: wharflab/zed-extensions
          token: ${{ steps.app-token.outputs.token }}
          path: zed-extensions
      - name: Checkout upstream zed-extensions (dry run)
        uses: actions/checkout@v6
        if: github.event_name == 'pull_request'
        with:
          lfs: false
          repository: zed-industries/extensions
          path: zed-extensions
      - name: Install taplo
        if: github.event_name == 'pull_request' || vars.HARBOR_PILOT_APP_ID != ''
        uses: taiki-e/install-action@v2
        with:
          tool: taplo
      - name: Publish to Zed Extensions registry
        if: github.event_name == 'pull_request' || vars.HARBOR_PILOT_APP_ID != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROSS_FORK_PR_PAT: ${{ secrets.CROSS_FORK_PR_PAT }}
          PR_BODY: |
            Publishing version ${{ inputs.version || github.ref_name }} of the [tally](https://github.com/wharflab/tally) extension.

            Tally is a Dockerfile linter and formatter written in Go, promoting modern container syntax and helping avoid common pitfalls.

            [Changelog](https://github.com/wharflab/tally/releases/tag/${{ inputs.version || github.ref_name }})
        run: |
          CLEAN_VERSION="${VERSION#v}"
          BRANCH="tally-update"

          # Use real identity for commits so the Zed CLA bot recognizes the contributor.
          git config --global user.name "tinovyatkin"
          git config --global user.email "tino@vtkn.io"

          # --- Prepare the tally submodule with version bump ---
          cd tally

          # Set version in extension manifest to match the release tag.
          EXT_TOML="_integrations/zed-tally/extension.toml"
          CARGO_TOML="_integrations/zed-tally/Cargo.toml"

          sed -i "s/^version = .*/version = \"${CLEAN_VERSION}\"/" "${EXT_TOML}"
          ACTUAL="$(taplo get -f "${EXT_TOML}" --strip-newline version)"
          if [ "${ACTUAL}" != "${CLEAN_VERSION}" ]; then
            echo "::error::Failed to set version in extension.toml (expected=${CLEAN_VERSION}, actual=${ACTUAL})"
            exit 1
          fi

          sed -i "0,/^version = .*/s/^version = .*/version = \"${CLEAN_VERSION}\"/" "${CARGO_TOML}"
          ACTUAL="$(taplo get -f "${CARGO_TOML}" --strip-newline package.version)"
          if [ "${ACTUAL}" != "${CLEAN_VERSION}" ]; then
            echo "::error::Failed to set version in Cargo.toml (expected=${CLEAN_VERSION}, actual=${ACTUAL})"
            exit 1
          fi

          git add "${EXT_TOML}" "${CARGO_TOML}"
          git commit -m "zed: set extension version to ${CLEAN_VERSION}"

          if [ "${DRY_RUN}" = "1" ]; then
            SUBMODULE_SHA="${GITHUB_SHA}"
          else
            # Push the version-bump commit to tally so the SHA is resolvable
            # when zed-industries/extensions CI clones the submodule.
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/wharflab/tally.git" \
              "HEAD:refs/heads/zed-release-v${CLEAN_VERSION}"
            SUBMODULE_SHA="$(git rev-parse HEAD)"
          fi
          cd ..

          # --- Update the zed-extensions fork ---
          cd zed-extensions

          # Sync with upstream
          git remote add upstream https://github.com/zed-industries/extensions.git 2>/dev/null || true
          git fetch upstream main
          git checkout -B "${BRANCH}" upstream/main

          # Add or update the tally submodule
          git submodule update --init extensions/tally 2>/dev/null || git submodule add https://github.com/wharflab/tally.git extensions/tally
          cd extensions/tally
          if [ "${DRY_RUN}" = "1" ]; then
            git fetch origin "${PR_HEAD_REF}"
            git checkout FETCH_HEAD
          else
            git fetch origin "${SUBMODULE_SHA}"
            git checkout "${SUBMODULE_SHA}"
          fi
          cd ../..

          # Update or add [tally] entry in extensions.toml
          if taplo get -f extensions.toml tally.version >/dev/null 2>&1; then
            # Entry exists — update version in place
            sed -i "/^\[tally\]/,/^version = /s/^version = .*/version = \"${CLEAN_VERSION}\"/" extensions.toml
          else
            # Initial registration — append the entry
            printf '\n%s\n%s\n%s\n%s\n' \
              '[tally]' \
              'submodule = "extensions/tally"' \
              'path = "_integrations/zed-tally"' \
              "version = \"${CLEAN_VERSION}\"" >> extensions.toml
          fi
          ACTUAL="$(taplo get -f extensions.toml --strip-newline tally.version)"
          if [ "${ACTUAL}" != "${CLEAN_VERSION}" ]; then
            echo "::error::Failed to set version in extensions.toml (expected=${CLEAN_VERSION}, actual=${ACTUAL})"
            exit 1
          fi

          git add extensions/tally extensions.toml
          if git diff --cached --quiet; then
            echo "No Zed marketplace changes detected; skipping PR sync."
            exit 0
          fi
          if [ "${DRY_RUN}" = "1" ]; then
            git diff --cached > ../zed-dry-run.patch
            echo "Generated Zed dry-run patch:"
            git diff --cached --stat
            exit 0
          fi
          git commit -m "tally: update to v${CLEAN_VERSION}"
          git push origin "${BRANCH}" --force

          # Create or update cross-fork PR against zed-industries/extensions.
          # Requires CROSS_FORK_PR_PAT (a PAT with public_repo scope) because
          # GITHUB_TOKEN and app tokens are scoped to wharflab repos only.
          if [ -z "${CROSS_FORK_PR_PAT:-}" ]; then
            echo "::error::CROSS_FORK_PR_PAT secret is required to create cross-fork PRs to zed-industries/extensions"
            exit 1
          fi
          export GH_TOKEN="${CROSS_FORK_PR_PAT}"

          # Try to create the PR; if it already exists, extract the URL and update it.
          PR_TITLE="tally: v${CLEAN_VERSION}"

          PR_URL=$(gh pr create \
            --repo zed-industries/extensions \
            --head "wharflab:${BRANCH}" \
            --base main \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}" 2>&1) \
          || {
            # gh pr create prints the existing PR URL on failure — extract the PR number
            EXISTING_PR=$(echo "${PR_URL}" | grep -oP 'pull/\K[0-9]+' | head -1)
            if [ -n "${EXISTING_PR}" ]; then
              gh pr edit "${EXISTING_PR}" \
                --repo zed-industries/extensions \
                --title "${PR_TITLE}" \
                --body "${PR_BODY}"
              echo "Updated existing PR: https://github.com/zed-industries/extensions/pull/${EXISTING_PR}"
            else
              echo "::error::Failed to create or update PR: ${PR_URL}"
              exit 1
            fi
          }
          echo "PR: ${PR_URL}"
      - name: Upload Zed dry-run patch
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: zed-dry-run-patch
          path: zed-dry-run.patch
