          ignore-nothing-to-cache: true
      - name: Build PyPI wheels
        run: |
          set -euo pipefail
          cd packaging/pypi
          rm -rf dist
          for target in \
            "linux x86_64" \
            "linux arm64" \
            "darwin x86_64" \
            "darwin arm64" \
            "windows x86_64" \
