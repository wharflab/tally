            bunx @vscode/vsce publish --pat "$VSCE_PAT" --packagePath "$vsix"
          done
  explain-vscode-pr-dry-run:
    if: github.event_name == 'pull_request'
    needs: build-vscode-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Explain VS Code Marketplace dry-run behavior
        run: |
          {
            echo "VS Code Marketplace publish is intentionally skipped on pull_request dry-runs."
            echo
            echo "Reason: pre-release publishes still use the main extension ID and consume Marketplace version numbers."
            echo "Our PR release versions use semver prerelease identifiers, which VS Code Marketplace pre-release publishing does not accept."
            echo "Publishing PR builds would therefore either fail or force future stable releases to jump ahead of PR-only versions."
            echo
            echo "If we want true PR publish validation for VS Code, we need a dedicated test extension identity."
          } >> "$GITHUB_STEP_SUMMARY"
  publish-openvsx:
