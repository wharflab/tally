---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: read
  id-token: write
env:
  GOEXPERIMENT: jsonv2
jobs:
  metrics:
    name: Mehen Metrics
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ophidiarium/mehen@v0
        with:
          install-method: cargo
          github-token: ${{ secrets.GITHUB_TOKEN }}
          paths: |
            main.go
            cmd
            internal
            _tools
            _integrations/vscode-tally/src
            _integrations/vscode-tally/test
            _integrations/zed-tally
            packaging/pypi
            scripts
          exclude: |
            **/node_modules/**
            **/target/**
            **/dist/**
  # Producer job: rebuilds/restores shellcheck.wasm from the buildx GHA cache
  # (~15s on cache hit) and uploads it as a workflow artifact for
  # test-windows, which cannot run BuildKit. Linux jobs here call the
  # composite action directly for parallelism.
  shellcheck-wasm:
    name: Build shellcheck.wasm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/shellcheck-wasm
        with:
          artifact-name: shellcheck-wasm
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/shellcheck-wasm
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Verify PowerShell analyzer runtime
        shell: pwsh
        run: |
          $PSVersionTable.PSVersion
          Get-Module -ListAvailable PSScriptAnalyzer | Select-Object Name, Version, Path
      - name: Ensure PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable PSScriptAnalyzer)) {
            $installPSResource = Get-Command -Name Install-PSResource -ErrorAction SilentlyContinue
            if ($null -ne $installPSResource) {
              $params = @{
                Name = 'PSScriptAnalyzer'
                Scope = 'CurrentUser'
                ErrorAction = 'Stop'
              }
              if ($installPSResource.Parameters.ContainsKey('TrustRepository')) { $params['TrustRepository'] = $true }
              if ($installPSResource.Parameters.ContainsKey('AcceptLicense')) { $params['AcceptLicense'] = $true }
              if ($installPSResource.Parameters.ContainsKey('Quiet')) { $params['Quiet'] = $true }
              Install-PSResource @params | Out-Null
              return
            }

            $installModule = Get-Command -Name Install-Module -ErrorAction SilentlyContinue
            if ($null -ne $installModule) {
              $params = @{
                Name = 'PSScriptAnalyzer'
                Scope = 'CurrentUser'
                Force = $true
                ErrorAction = 'Stop'
              }
              if ($installModule.Parameters.ContainsKey('AcceptLicense')) { $params['AcceptLicense'] = $true }
              if ($installModule.Parameters.ContainsKey('AllowClobber')) { $params['AllowClobber'] = $true }
              if ($installModule.Parameters.ContainsKey('SkipPublisherCheck')) { $params['SkipPublisherCheck'] = $true }
              Install-Module @params | Out-Null
              return
            }

            throw 'PSScriptAnalyzer is not installed, and neither Install-PSResource nor Install-Module is available in this pwsh environment.'
          }
      - name: Run unit tests with coverage
        run: |
          GOTESTSUM_BIN=$(make -s print-gotestsum-bin)
          make "$GOTESTSUM_BIN"
          mkdir -p coverage
          # Exclude scripts/* from coverage collection (they are tooling, not product code).
          COVERPKG=$(go list ./... | grep -v '/scripts/' | paste -sd, -)
          "$GOTESTSUM_BIN" --format testname --junitfile junit.xml -- \
            -race -coverprofile=coverage.out -covermode=atomic -coverpkg="$COVERPKG" ./...
      - name: Run integration tests with coverage
        run: |
          # Integration tests use -cover build and write binary coverage data
          GOTESTSUM_BIN=$(make -s print-gotestsum-bin)
          GOCOVERDIR="$(pwd)/coverage" "$GOTESTSUM_BIN" --format testname --junitfile junit-integration.xml -- ./internal/integration/...
      - name: Run LSP protocol tests with coverage
        run: |
          # LSP black-box tests launch tally lsp --stdio as a subprocess
          GOTESTSUM_BIN=$(make -s print-gotestsum-bin)
          GOCOVERDIR="$(pwd)/coverage" "$GOTESTSUM_BIN" --format testname --junitfile junit-lsptest.xml -- ./internal/lsptest/...
          # Convert all binary coverage data (integration + LSP) to text format.
          go tool covdata textfmt -i=coverage -o=coverage-integration.txt
          # Merge unit + black-box coverage into a single Go coverprofile for Codecov.
          bash scripts/merge-go-coverprofiles.sh coverage-merged.out coverage.out coverage-integration.txt
          # Force generated code to 100% coverage to avoid skewing project totals.
          bash scripts/filter-go-coverprofile.sh coverage-merged.out coverage.filtered.out
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: coverage.filtered.out
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          report_type: test_results
          use_oidc: true
          files: junit.xml,junit-integration.xml,junit-lsptest.xml
          fail_ci_if_error: true
  test-windows:
    name: Test (Windows)
    needs: shellcheck-wasm
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/download-shellcheck-wasm
        with:
          artifact-name: shellcheck-wasm
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Run tests
        run: go test ./... -v -race
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/shellcheck-wasm
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify schema generation invariants
        run: make schema-check
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version-file: .golangci-lint-version
  deadcode:
    name: Dead Code Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/shellcheck-wasm
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Add deadcode problem matcher
        run: echo "::add-matcher::.github/matchers/deadcode-matcher.json"
      - name: Run deadcode
        run: make deadcode
  cpd:
    name: Copy/Paste Detection
    runs-on: ubuntu-latest
    env:
      PMD_VERSION: 7.20.0
    steps:
      - uses: actions/checkout@v6
      - name: Setup PMD
        run: |
          curl -fL "https://github.com/pmd/pmd/releases/download/pmd_releases%2F${PMD_VERSION}/pmd-dist-${PMD_VERSION}-bin.zip" -o pmd.zip
          unzip -q pmd.zip
          rm pmd.zip
      - name: Run CPD
        run: |
          # Create exclusion list (tests, generated files, and fixtures)
          find . -type f \( \
            -name "*_test.go" \
            -o -name "*.pb.go" \
            -o -name "*_generated.go" \
            -o -name "*.gen.go" \
            -o -name "*_gen.go" \
            -o -path "*/testdata/*" \
            -o -path "*/__snapshots__/*" \
            -o -path "*/packaging/*" \
            -o -path "*/bin/*" \
          \) > exclude-files.txt

          # Count files
          TOTAL_GO=$(find . -type f -name "*.go" | wc -l)
          EXCLUDED=$(wc -l < exclude-files.txt)
          SCANNED=$((TOTAL_GO - EXCLUDED))
          echo "📋 Scanning $SCANNED Go files (excluding $EXCLUDED test/generated files, threshold: 100 tokens)..."

          # Run CPD with exclusion list - fail build if duplications are found
          echo "🔍 Running CPD..."
          if "pmd-bin-${PMD_VERSION}/bin/pmd" cpd --language go --minimum-tokens 100 \
            --dir . --exclude-file-list exclude-files.txt --format text --debug; then
            echo "✅ No code duplications found!"
          else
            echo "❌ Code duplications detected above threshold"
            exit 1
          fi
  rumdl:
    name: rumdl markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - run: uv tool run rumdl==0.1.84 check --output-format github .
