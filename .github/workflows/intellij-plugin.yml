---
name: IntelliJ Plugin
on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/intellij-plugin.yml"
      - ".github/actions/shellcheck-wasm/**"
      - ".github/actions/download-shellcheck-wasm/**"
      - "_integrations/intellij-tally/**"
      - "_tools/shellcheck-wasm/**"
      - "Makefile"
  push:
    branches: [main]
    paths:
      - ".github/workflows/intellij-plugin.yml"
      - ".github/actions/shellcheck-wasm/**"
      - ".github/actions/download-shellcheck-wasm/**"
      - "_integrations/intellij-tally/**"
      - "_tools/shellcheck-wasm/**"
      - "Makefile"
  workflow_dispatch:
permissions:
  contents: read
env:
  GOEXPERIMENT: jsonv2
jobs:
  build-intellij-plugin:
    name: Build IntelliJ plugin
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/shellcheck-wasm
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Build tally
        run: make build
      # The Kotlin Toolchain wrapper provisions itself into ~/.cache, the
      # tally-build plugin downloads IDEA Community + plugin verifier into
      # _integrations/intellij-tally/build/, and Amper resolves Maven deps
      # (IntelliJ Platform jars, Kotlin stdlib, lsp4j) into its own cache.
      - name: Cache Kotlin Toolchain and build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/JetBrains/Kotlin
            _integrations/intellij-tally/build/tasks/_intellij-plugin_downloadIde@tally-build
            _integrations/intellij-tally/build/tasks/_intellij-plugin_ktlintCheck@tally-build
            _integrations/intellij-tally/build/tasks/_intellij-plugin_ktlintFormat@tally-build
          key: intellij-toolchain-${{ runner.os }}-${{ hashFiles('_integrations/intellij-tally/intellij-plugin/module.yaml', '_integrations/intellij-tally/kotlin') }}
          restore-keys: |
            intellij-toolchain-${{ runner.os }}-
      - name: Build and verify IntelliJ plugin
        run: make intellij-plugin-verify
      - name: IntelliJ Community smoke check
        run: make intellij-plugin-smoke
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: tally-intellij-plugin
          path: _integrations/intellij-tally/dist/*.zip
          if-no-files-found: error
