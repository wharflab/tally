---
name: IntelliJ Plugin
on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/intellij-plugin.yml"
      - ".github/actions/shellcheck-wasm/**"
      - ".github/actions/download-shellcheck-wasm/**"
      - "_integrations/intellij-tally/**"
      - "_tools/shellcheck-wasm/**"
      - "Makefile"
  push:
    branches: [main]
    paths:
      - ".github/workflows/intellij-plugin.yml"
      - ".github/actions/shellcheck-wasm/**"
      - ".github/actions/download-shellcheck-wasm/**"
      - "_integrations/intellij-tally/**"
      - "_tools/shellcheck-wasm/**"
      - "Makefile"
  workflow_dispatch:
permissions:
  contents: read
env:
  GOEXPERIMENT: jsonv2
jobs:
  build-intellij-plugin:
    name: Build IntelliJ plugin
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/shellcheck-wasm
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ github.job }}-${{ runner.os }}
          external-cache: true
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Build tally
        run: bazel build --config=release //:tally
      - name: Build IntelliJ plugin
        run: |
          set -euo pipefail
          bazel build --//:release_version=0.1.0-dev //_integrations/intellij-tally:plugin_zip
          mkdir -p _integrations/intellij-tally/dist
          cp bazel-bin/_integrations/intellij-tally/tally-intellij-plugin.zip \
            _integrations/intellij-tally/dist/tally-intellij-plugin-0.1.0-dev.zip
      - name: Run IntelliJ plugin verifier
        run: make intellij-plugin-verify
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: tally-intellij-plugin
          path: _integrations/intellij-tally/dist/*.zip
          if-no-files-found: error
