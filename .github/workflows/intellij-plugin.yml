---
name: IntelliJ Plugin
on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/intellij-plugin.yml"
      - ".github/actions/shellcheck-wasm/**"
      - ".github/actions/download-shellcheck-wasm/**"
      - "_integrations/intellij-tally/**"
      - "_tools/shellcheck-wasm/**"
      - "Makefile"
  push:
    branches: [main]
    paths:
      - ".github/workflows/intellij-plugin.yml"
      - ".github/actions/shellcheck-wasm/**"
      - ".github/actions/download-shellcheck-wasm/**"
      - "_integrations/intellij-tally/**"
      - "_tools/shellcheck-wasm/**"
      - "Makefile"
  workflow_dispatch:
permissions:
  contents: read
env:
  GOEXPERIMENT: jsonv2
jobs:
  build-intellij-plugin:
    name: Build IntelliJ plugin
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/shellcheck-wasm
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Build tally
        run: make build
      - name: Cache IntelliJ build toolchains
        uses: actions/cache@v5
        with:
          path: _integrations/intellij-tally/.cache
          key: intellij-toolchain-${{ runner.os }}-${{ hashFiles('_integrations/intellij-tally/build/versions.toml') }}
          restore-keys: |
            intellij-toolchain-${{ runner.os }}-
      - name: Build and verify IntelliJ plugin
        run: make intellij-plugin-verify
      - name: IntelliJ Community smoke check
        run: make intellij-plugin-smoke
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: tally-intellij-plugin
          path: _integrations/intellij-tally/dist/*.zip
          if-no-files-found: error
