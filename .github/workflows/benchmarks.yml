---
name: Benchmarks
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual triggering
  workflow_dispatch:
permissions:
  contents: read
  id-token: write # Required for CodSpeed OIDC authentication
env:
  GOEXPERIMENT: jsonv2
jobs:
  benchmarks:
    name: CodSpeed Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: ./.github/actions/shellcheck-wasm
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ github.job }}-${{ runner.os }}
          external-cache: true
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          # Go only supports walltime mode currently
          mode: walltime
          # Use longer benchtime and multiple runs to reduce noise on shared runners
          run: bazel test --config=go --test_output=streamed --test_arg=-test.bench=. --test_arg=-test.benchtime=5s --test_arg=-test.count=5 //internal/integration:go_default_test
