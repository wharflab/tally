---
name: Benchmarks
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual triggering
  workflow_dispatch:
permissions:
  contents: read
  id-token: write # Required for CodSpeed OIDC authentication
env:
  GOEXPERIMENT: jsonv2
jobs:
  benchmarks:
    name: CodSpeed Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: ./.github/actions/shellcheck-wasm
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ github.job }}-${{ runner.os }}
          external-cache: true
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Build benchmark prerequisites
        id: benchmark-binaries
        run: |
          bazel build --config=release //:tally //internal/ai/acp/testdata/testagent
          echo "acp_agent=$(pwd)/$(tools/bazel/target_output.sh --config=release //internal/ai/acp/testdata/testagent)" >> "$GITHUB_OUTPUT"
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          # Go only supports walltime mode currently
          mode: walltime
          run: go test -bench=. ./internal/integration
        env:
          TALLY_ACP_AGENT_BINARY: ${{ steps.benchmark-binaries.outputs.acp_agent }}
