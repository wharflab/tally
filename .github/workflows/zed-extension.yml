---
name: Zed Extension
on:
  pull_request:
    branches: [main]
    paths:
      - '_integrations/zed-tally/**'
      - '.github/workflows/zed-extension.yml'
  push:
    branches: [main]
    paths:
      - '_integrations/zed-tally/**'
      - '.github/workflows/zed-extension.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    name: Zed Extension Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ github.job }}-${{ runner.os }}
          external-cache: true
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Unit tests
        run: bazel test --config=zed-linux //_integrations/zed-tally:unit_tests
      - name: WASM build
        run: bazel build --config=zed-wasm --config=zed-linux-exec //_integrations/zed-tally:zed_tally
