---
name: Build shellcheck.wasm
description: |
  Builds internal/shellcheck/wasm/shellcheck.wasm via the Bazel target
  //_tools/shellcheck-wasm:shellcheck_wasm. Bazel owns the declared output and
  cache key; the target invokes BuildKit because the build recipe still needs
  Dockerfile RUN steps to install the GHC WASI toolchain, patch ShellCheck, and
  compile the reactor module.

  Every Linux job that needs the wasm (directly or transitively via
  `go build`/`go test`) should invoke this action before compiling Go code
  — independent parallel runs are fine, they share the Bazel external cache.
  macOS/Windows jobs cannot run BuildKit; pass `artifact-name` in one Linux
  job so the action also uploads the wasm as a workflow artifact that
  `download-shellcheck-wasm` consumes.

  The setup-buildx-action step installs a recent upstream BuildKit so the
  Dockerfile's `ADD <git-url>?ref=...` instructions work against github.com
  and gitlab.haskell.org — older BuildKit shipped with some Docker Engine
  releases mishandles the 301 redirect that drops `.git` from the URL.
  The GitHub Actions runtime step exposes the cache variables needed when a
  manual `docker buildx build` invocation uses the `type=gha` cache backend.
inputs:
  artifact-name:
    description: |
      When set, upload the built wasm as a workflow artifact under this
      name. Use this in exactly one Linux job in workflows that have
      macOS/Windows consumers (which fetch the artifact via
      download-shellcheck-wasm). Linux-only workflows should leave this
      blank and have each Linux job call this action directly.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Expose GitHub Actions runtime for BuildKit cache
      uses: crazy-max/ghaction-github-runtime@v3
    - name: Set up Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: shellcheck-wasm-${{ runner.os }}
        external-cache: true
        repository-cache: true
        cache-save: ${{ github.event_name != 'pull_request' }}
    - name: Build shellcheck.wasm
      shell: bash
      run: |
        set -euo pipefail
        bazel build \
          --action_env=ACTIONS_CACHE_SERVICE_V2 \
          --action_env=ACTIONS_CACHE_URL \
          --action_env=ACTIONS_RESULTS_URL \
          --action_env=ACTIONS_RUNTIME_TOKEN \
          --action_env=ACTIONS_RUNTIME_URL \
          --action_env=TALLY_SHELLCHECK_WASM_GHA_CACHE=1 \
          //_tools/shellcheck-wasm:shellcheck_wasm
        mkdir -p internal/shellcheck/wasm
        cp bazel-bin/_tools/shellcheck-wasm/shellcheck.wasm \
          internal/shellcheck/wasm/shellcheck.wasm
    - name: Verify artifact
      shell: bash
      run: |
        set -euo pipefail
        path=internal/shellcheck/wasm/shellcheck.wasm
        if [ ! -s "$path" ]; then
          echo "::error::shellcheck.wasm missing or empty at $path after build"
          exit 1
        fi
        size=$(wc -c <"$path")
        echo "Built shellcheck.wasm: ${size} bytes"
    - name: Upload wasm as workflow artifact
      if: inputs.artifact-name != ''
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: internal/shellcheck/wasm/shellcheck.wasm
        if-no-files-found: error
        retention-days: 1
