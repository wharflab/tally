[project]
authors = [{ name = "Konstantin Vyatkin", email = "tino@vtkn.io" }]
classifiers = [
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Quality Assurance",
]
description = "A fast, configurable linter for Dockerfiles and Containerfiles"
dynamic = ["version"]
license = "AGPL-3.0-only"
license-files = ["LICENSE", "NOTICE"]
name = "tally-cli"
readme = "README.md"
requires-python = ">=3.9"

[project.urls]
Homepage = "https://tally.wharflab.com/"

[project.scripts]
tally = "tally_cli.main:main"

[build-system]
build-backend = "hatchling.build"
requires      = ["hatchling"]

[tool.hatch.build.targets.wheel]
artifacts = ["tally_cli/bin/**/*"]
packages  = ["tally_cli"]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

[tool.hatch.metadata.hooks.custom]
path = "hatch_build.py"

[tool.hatch.build.targets.sdist]
include = [
    "LICENSE",
    "NOTICE",
    "README.md",
    "hatch_build.py",
    "pyproject.toml",
    "tally_cli/",
]
