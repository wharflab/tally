---
version: 2
project_name: tally
before:
  hooks:
    - go mod tidy
tally_build_defaults: &tally_build_defaults
  binary: tally
  tags:
    - containers_image_openpgp
    - containers_image_storage_stub
    - containers_image_docker_daemon_stub
  flags:
    - -trimpath
  ldflags:
    - -s -w -X github.com/wharflab/tally/internal/version.version={{.Version}} -X github.com/wharflab/tally/internal/version.commit={{.Commit}}
builds:
  - id: tally-linux-amd64
    !!merge <<: *tally_build_defaults
    env:
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    goos: [linux]
    goarch: [amd64]
    # Keep build flags in sync with .github/workflows/binary-size.yml (tags,
    # ldflags, trimpath). Release builds run inside goreleaser-cross so every
    # shipped binary includes the cgo-backed PowerShell parser.
  - id: tally-linux-arm64
    !!merge <<: *tally_build_defaults
    env:
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    goos: [linux]
    goarch: [arm64]
  - id: tally-darwin-amd64
    !!merge <<: *tally_build_defaults
    env:
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - CC=o64-clang
      - CXX=o64-clang++
    goos: [darwin]
    goarch: [amd64]
  - id: tally-darwin-arm64
    !!merge <<: *tally_build_defaults
    env:
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - CC=oa64-clang
      - CXX=oa64-clang++
    goos: [darwin]
    goarch: [arm64]
  - id: tally-windows-amd64
    !!merge <<: *tally_build_defaults
    env:
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    goos: [windows]
    goarch: [amd64]
  - id: tally-windows-arm64
    !!merge <<: *tally_build_defaults
    env:
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - CC=/llvm-mingw/bin/aarch64-w64-mingw32-gcc
      - CXX=/llvm-mingw/bin/aarch64-w64-mingw32-g++
    goos: [windows]
    goarch: [arm64]
archives:
  - id: tally
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
    name_template: >-
      {{ .ProjectName }}_ {{- .Version }}_ {{- if eq .Os "darwin" }}MacOS {{- else }}{{ title .Os }}{{ end }}_ {{- if eq .Arch "amd64" }}x86_64 {{- else }}{{ .Arch }}{{ end }}
checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256
snapshot:
  version_template: "{{ .Tag }}"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
