[slow-checks]
mode = "off"

[rules]
include = ["tally/invalid-json-form", "buildkit/JSONArgsRecommended"]
exclude = ["*"]

# Elevate JSONArgsRecommended to error so supersession does not suppress it,
# allowing the test to assert both rules fire on the same line.
[rules.buildkit.JSONArgsRecommended]
severity = "error"
