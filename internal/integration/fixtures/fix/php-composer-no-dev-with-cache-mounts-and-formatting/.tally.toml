unsafe-fixes = true

[slow-checks]
mode = "off"

[rules]
include = ["tally/no-multi-spaces", "tally/consistent-indentation", "tally/php/composer-no-dev-in-production", "tally/prefer-package-cache-mounts", "tally/newline-per-chained-call"]
exclude = ["*"]

[output]
fail-level = "none"

[rules.tally.consistent-indentation]
severity = "style"

[rules.tally.prefer-package-cache-mounts]
severity = "warning"
