[project]
site_name = "tally"
site_url = "https://wharflab.github.io/tally/"
site_description = "Fast, modern Dockerfile linter with auto-fixes"
docs_dir = "docs"
site_dir = "site"
extra_css = ["assets/extra.css"]

repo_url = "https://github.com/wharflab/tally"
repo_name = "wharflab/tally"


[[nav]]
name = "Home"
path = "index.md"

[[nav]]
name = "Guide"
items = [{ name = "Configuration", path = "guide/configuration.md" }]

[[nav]]
name = "Rules"
items = [
  { name = "Overview", path = "rules/index.md" },
  { name = "tally Rules", path = "rules/tally/index.md" },
]


[project.theme]
language = "en"
variant = "modern"
features = [
  "navigation.tabs",
  "navigation.top",
  "navigation.indexes",
  "navigation.instant",
  "content.code.annotate",
  # "content.code.copy",
  # "content.action.edit",
  "content.action.view",
  "search.highlight",
]
font.code = "JetBrains Mono"

[project.theme.icon]
logo = "fontawesome/solid/anchor"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "deep orange"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "deep orange"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# see https://github.com/D4Vinci/Scrapling/blob/main/zensical.toml
[project.extra.analytics]
provider = "google"
property = "GTM-TS8W7SMP"

[project.extra.analytics.feedback]
title = "Was this page helpful?"

[[project.extra.analytics.feedback.ratings]]
icon = "material/heart"
name = "This page was helpful"
data = 1
note = "Thanks for your feedback!"

[[project.extra.analytics.feedback.ratings]]
icon = "material/heart-broken"
name = "This page could be improved"
data = 0
note = """
Thanks for your feedback! Help us improve this page by
<a href="https://github.com/wharflab/tally/issues/new" target="_blank" rel="noopener">opening a documentation issue</a>.
"""
